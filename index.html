<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somerset & Devon FCR Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Somerset & Devon FCR Stats</h1>
    </header>

    <main>
        <section id="buildings">
            <h2>Buildings</h2>
            <table id="buildingsTable">
                <thead>
                    <tr>
                        <th>Building Name</th>
                        <th>Quantity</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Buildings data will be inserted here by JavaScript -->
                </tbody>
            </table>
        </section>

        <section id="vehicles">
            <h2>Vehicles</h2>
            <table id="vehiclesTable">
                <thead>
                    <tr>
                        <th>Vehicle Name</th>
                        <th>Quantity</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Vehicles data will be inserted here by JavaScript -->
                </tbody>
            </table>
        </section>

        <section id="staff">
            <h2>Staff</h2>
            <table id="staffTable">
                <thead>
                    <tr>
                        <th>Staff Role</th>
                        <th>Quantity</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Staff data will be inserted here by JavaScript -->
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Somerset & Devon FCR</p>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
